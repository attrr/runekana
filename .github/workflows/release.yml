name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
            arch: amd64
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build Docker Image
        run: |
          nix build .#dockerImage
          cp -L result image.tar.gz

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v7
        with:
          name: image-${{ matrix.arch }}
          path: image.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install tools
        run: nix profile install nixpkgs#go-containerregistry nixpkgs#gnused
          nixpkgs#skopeo

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: images

      - name: Push Multi-Arch Image
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository }}
          IMAGE_ID=$(echo $IMAGE_ID | tr "[A-Z]" "[a-z]")

          VERSION=$(echo "${{ github.ref }}" | sed -e "s,.*/\(.*\),\1,")
          [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e "s/^v//")

          # Push architecture-specific images
          skopeo copy --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            docker-archive:images/image-amd64/image.tar.gz \
            docker://$IMAGE_ID:latest-amd64
            
          skopeo copy --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            docker-archive:images/image-arm64/image.tar.gz \
            docker://$IMAGE_ID:latest-arm64

          # Log in for crane (manifest operations)
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin

          # Create and push the multi-arch manifests (pointing to the latest-arch tags)
          crane index append -t $IMAGE_ID:$VERSION -m $IMAGE_ID:latest-amd64 -m $IMAGE_ID:latest-arm64
          crane index append -t $IMAGE_ID:latest -m $IMAGE_ID:latest-amd64 -m $IMAGE_ID:latest-arm64
